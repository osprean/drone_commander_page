# =============================================================================
# k8s/values-prod.yaml — overlay PROD para comacon-drone-commander.
# =============================================================================
# Override mínimo: solo el host del Ingress.
# =============================================================================

# === Image (pin a SemVer promovido desde staging) =========================
image:
  tag: v1.1.0

# === Configuration (Path B runtime config — override staging URL) =========
configuration:
  API_URL: https://api.k8s.prod.osprean.net/

routes:
  - host: drones.k8s.prod.osprean.net
    ingressClass: nginx-public
    tls: true
    paths:
      - path: /
        pathType: Prefix
        port: 8080
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
