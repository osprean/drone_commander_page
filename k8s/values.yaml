# =============================================================================
# k8s/values.yaml — declarative deploy spec para comacon-drone-commander.
# =============================================================================

componentName: comacon-drone-commander
tier: frontend


image:
  repository: comacon.azurecr.io/comacon-drone-commander
  tag: sha-INITIAL
  pullPolicy: IfNotPresent

replicaCount: 2


resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi


configuration: {}


security:
  secretConfigurations: []


# drones.k8s.staging.osprean.net → cluster (paralelo a drones.staging VM).
routes:
  - host: drones.k8s.staging.osprean.net
    ingressClass: nginx-public
    tls: true
    paths:
      - path: /
        pathType: Prefix
        port: 8080
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod


service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8080


probes:
  liveness:
    enabled: true
    path: /healthz
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    enabled: true
    path: /healthz
    port: 8080
    initialDelaySeconds: 2
    periodSeconds: 5


podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]


serviceAccount:
  create: true
  automountServiceAccountToken: false


workloadIdentity:
  enabled: false
