name: CI (k8s lift)

# Quality gate para migration/k8s-lift. Convive con deploy.yml legacy.

on:
  pull_request:
    branches: [migration/k8s-lift]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'vite.config.ts'
      - 'Dockerfile.k8s'
      - 'nginx.conf'
      - '.github/workflows/ci-k8s.yml'
  push:
    branches: [migration/k8s-lift]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'vite.config.ts'
      - 'Dockerfile.k8s'
      - 'nginx.conf'
      - '.github/workflows/ci-k8s.yml'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  build-checks:
    name: Build smoke (vite)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # NO cache:'npm' — drone_commander_page gitignorea lock-file.

      - name: Install deps
        run: npm install --legacy-peer-deps --no-audit

      # Lint/test/typecheck DESHABILITADOS (legacy code no preparado).

      - name: Build smoke (vite build, skip tsc-b)
        run: npx vite build
        env:
          VITE_API_BASE_URL: https://api.k8s.staging.osprean.net/

  docker-build:
    name: Build image (arm64)
    runs-on: ubuntu-24.04-arm
    needs: build-checks
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.k8s
          push: false
          load: false
          platforms: linux/arm64
          tags: comacon-drone-commander:ci-${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            BUILD_SHA=${{ github.sha }}
            APP_VERSION=ci
            VITE_API_BASE_URL=https://api.k8s.staging.osprean.net/
