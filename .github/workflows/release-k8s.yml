name: Release — Promote to production (k8s)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a promocionar (ej. v1.2.3)."
        required: true

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: comacon.azurecr.io
  IMAGE_NAME: comacon-drone-commander

jobs:
  promote:
    runs-on: ubuntu-24.04-arm
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.5/yq_linux_arm64
          sudo chmod +x /usr/local/bin/yq

      - name: Compute promotion metadata (Fix F — read source tag from values.yaml)
        # NO derivamos src_tag del SHA del commit tageado. La CD bot crea
        # commits "bump" SIN imagen; tageando HEAD tras una build cae en
        # el bump y el promote falla (incidente #2). Leemos image.tag de
        # values.yaml — es la verdad sobre qué imagen está en staging.
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          SRC_TAG=$(yq '.image.tag' k8s/values.yaml)
          if [ -z "${SRC_TAG}" ] || [ "${SRC_TAG}" = "null" ]; then
            echo "::error::image.tag missing from k8s/values.yaml — can't promote"
            exit 1
          fi
          echo "Source image tag (from values.yaml): ${SRC_TAG}"
          {
            echo "tag=${TAG}"
            echo "src_tag=${SRC_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CD_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify source image exists
        run: |
          if ! az acr manifest show --registry "${REGISTRY%%.*}" --name "${IMAGE_NAME}:${{ steps.meta.outputs.src_tag }}" &>/dev/null; then
            echo "::error::Source ${REGISTRY}/${IMAGE_NAME}:${{ steps.meta.outputs.src_tag }} no existe."
            exit 1
          fi

      - name: Add SemVer tag in ACR (no rebuild)
        run: |
          az acr import \
            --name "${REGISTRY%%.*}" \
            --source "${REGISTRY}/${IMAGE_NAME}:${{ steps.meta.outputs.src_tag }}" \
            --image  "${IMAGE_NAME}:${{ steps.meta.outputs.tag }}" \
            --force
